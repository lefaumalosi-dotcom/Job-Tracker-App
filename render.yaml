services:
  - type: web
    name: job-tracker-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    port: 8080
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: job-tracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: job-tracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: job-tracker-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: job-tracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: job-tracker-db
          property: password

databases:
  - name: job-tracker-db
    databaseName: job_tracker
    user: jobuser
    region: oregon
