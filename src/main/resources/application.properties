spring.application.name=job-tracker-app

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/job_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:jobuser}
spring.datasource.password=${DB_PASSWORD:jobpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.thymeleaf.cache=false
server.error.whitelabel.enabled=false
